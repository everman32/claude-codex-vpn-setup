services:
  ai-vpn:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
        CODEX_VERSION: ${CODEX_VERSION:-latest}

    container_name: ai-vpn
    hostname: ai-dev

    cap_add:
      - NET_ADMIN
      - NET_RAW

    devices:
      - /dev/net/tun:/dev/net/tun

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # Project source.
      - ${PROJECT_PATH}:/workspace

      # Maven local repository.
      - ${M2_REPO_PATH}:/home/dev/.m2

      # VPN configuration and credentials.
      - ./vpn:/vpn:ro

      # Shared volume, separate provider-specific subdirectories:
      #   /home/dev/.ai-state/claude
      #   /home/dev/.ai-state/codex
      - ai-state:/home/dev/.ai-state

    environment:
      # The launcher normally reads this from the host .env. Keeping it in the
      # container also makes direct docker exec commands provider-aware.
      AI_TOOL: ${AI_TOOL:-codex}

      # ── Claude Code ────────────────────────────────────────────
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      CLAUDE_CONFIG_DIR: /home/dev/.ai-state/claude

      # ── Codex ─────────────────────────────────────────────────
      CODEX_HOME: /home/dev/.ai-state/codex

      # API-key authentication is optional. Prefer logging in with ChatGPT for
      # subscription usage. An API key uses platform billing.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # Optional enterprise automation credential.
      CODEX_ACCESS_TOKEN: ${CODEX_ACCESS_TOKEN:-}

      # ── VPN ────────────────────────────────────────────────────
      HOST_SERVICE_TCP_PORTS: ${HOST_SERVICE_TCP_PORTS:-5434,19092}
      VPN_TIMEOUT: ${VPN_TIMEOUT:-90}
      # VPN_CONFIG: /vpn/windscribe-de.ovpn

      # ── Spring Boot container overrides ────────────────────────
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://host.docker.internal:5434/postgres}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-host.docker.internal:19092}

    stdin_open: true
    tty: true

    restart: unless-stopped

volumes:
  ai-state: