services:
  ai-vpn:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-2.1.217}
        CODEX_VERSION: ${CODEX_VERSION:-0.145.0}

    container_name: ai-vpn
    hostname: ai-dev

    cap_add:
      - NET_ADMIN
      - NET_RAW

    # bubblewrap creates nested Linux namespaces. Docker's default seccomp
    # profile blocks clone/unshare namespace operations for non-root users,
    # which makes both Claude and Codex nested sandboxes fail before they can
    # apply their own restrictions. Keep the capability set narrow and disable
    # only the outer seccomp filter; do not add SYS_ADMIN or privileged mode.
    # no-new-privileges still prevents setuid/file-capability escalation.
    security_opt:
      - seccomp=unconfined
      - no-new-privileges=true

    devices:
      - /dev/net/tun:/dev/net/tun

    # Disable IPv6 in this container's network namespace. The entrypoint and
    # health check verify every interface and fail closed if this is not true.
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "1"
      net.ipv6.conf.default.disable_ipv6: "1"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # Project source.
      - ${PROJECT_PATH}:/workspace

      # Maven artifact cache only. Host settings.xml, settings-security.xml,
      # toolchains.xml, and other ~/.m2 secrets are not exposed to the agent.
      - ${M2_REPO_PATH}:/home/dev/.m2/repository

      # The VPN directory is mounted beneath an image-created root:root 0700
      # parent. This preserves profiles with auxiliary cert/key files while
      # preventing the dev user from traversing to any VPN secrets.
      - type: bind
        source: ${VPN_DIR_PATH:-./vpn}
        target: /run/vpn-source/files
        read_only: true

      # Shared volume, separate provider-specific subdirectories:
      #   /home/dev/.ai-state/claude
      #   /home/dev/.ai-state/codex
      - ai-state:/home/dev/.ai-state

    environment:
      # The launcher normally reads this from the host .env. Keeping it in the
      # container also makes direct docker exec commands provider-aware.
      AI_TOOL: ${AI_TOOL:-codex}

      # ── Claude Code ────────────────────────────────────────────
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      CLAUDE_CONFIG_DIR: /home/dev/.ai-state/claude

      # ── Codex ─────────────────────────────────────────────────
      CODEX_HOME: /home/dev/.ai-state/codex

      # API-key authentication is optional. Prefer logging in with ChatGPT for
      # subscription usage. An API key uses platform billing.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # Optional enterprise automation credential.
      CODEX_ACCESS_TOKEN: ${CODEX_ACCESS_TOKEN:-}

      # ── VPN ────────────────────────────────────────────────────
      VPN_TIMEOUT: ${VPN_TIMEOUT:-90}
      VPN_SOURCE_DIR: /run/vpn-source
      VPN_CONFIG: /run/vpn-source/files/${VPN_CONFIG_FILE:-windscribe.ovpn}
      VPN_CREDS: /run/vpn-source/files/${VPN_CREDS_FILE:-credentials.txt}

      # Process/route/connectivity health checks. ROUTE_IP must be a numeric
      # public IPv4 address expected to route through tun0. Set URL blank only
      # when an external HTTPS probe is intentionally undesired.
      VPN_HEALTHCHECK_ROUTE_IP: ${VPN_HEALTHCHECK_ROUTE_IP:-1.1.1.1}
      VPN_HEALTHCHECK_HOST: ${VPN_HEALTHCHECK_HOST:-example.com}
      VPN_HEALTHCHECK_URL: ${VPN_HEALTHCHECK_URL:-https://example.com/}
      VPN_HEALTHCHECK_DNS_TIMEOUT: ${VPN_HEALTHCHECK_DNS_TIMEOUT:-8}
      VPN_HEALTHCHECK_HTTP_TIMEOUT: ${VPN_HEALTHCHECK_HTTP_TIMEOUT:-10}

      # Optional comma-separated override. When blank, DNS servers pushed by
      # OpenVPN are used. All configured resolvers must be reachable via tun0.
      VPN_DNS: ${VPN_DNS:-}
      VPN_DNS_TEST_HOST: ${VPN_DNS_TEST_HOST:-example.com}

      HOST_SERVICE_TCP_PORTS: ${HOST_SERVICE_TCP_PORTS:-5434,19092}

      # ── Spring Boot container overrides ────────────────────────
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://host.docker.internal:5434/postgres}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-host.docker.internal:19092}

    stdin_open: true
    tty: true

    restart: unless-stopped

volumes:
  ai-state: